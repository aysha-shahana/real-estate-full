{% extends "base.html" %} 
{% load static %} 
{% block content %}
<!-- Main Content -->

<div class="block-header">
  <div class="row">
    <div class="col-lg-5 col-md-5 col-sm-12">
      <h2>
        Add UserGroup
        <small>Welcome to Oreo</small>
      </h2>
    </div>
    <div class="col-lg-7 col-md-7 col-sm-12 text-md-right">
      <div class="inlineblock text-center m-r-15 m-l-15 hidden-md-down">
        <div
          class="sparkline"
          data-type="bar"
          data-width="97%"
          data-height="25px"
          data-bar-width="2"
          data-bar-spacing="5"
          data-bar-color="#fff"
        >
          3,2,6,5,9,8,7,9,5,1,3,5,7,4,6
        </div>
        <small class="col-white">Visitors</small>
      </div>
      <div class="inlineblock text-center m-r-15 m-l-15 hidden-md-down">
        <div
          class="sparkline"
          data-type="bar"
          data-width="97%"
          data-height="25px"
          data-bar-width="2"
          data-bar-spacing="5"
          data-bar-color="#fff"
        >
          1,3,5,7,4,6,3,2,6,5,9,8,7,9,5
        </div>
        <small class="col-white">Bounce Rate</small>
      </div>
      <button
        class="btn btn-white btn-icon btn-round hidden-sm-down float-right ml-3"
        type="button"
      >
        <i class="zmdi zmdi-plus"></i>
      </button>
      <ul class="breadcrumb float-md-right">
        <li class="breadcrumb-item">
          <a href="index.html"><i class="zmdi zmdi-home"></i> Oreo</a>
        </li>
        <li class="breadcrumb-item active">Add UserGroup</li>
      </ul>
    </div>
  </div>
</div>
<div class="container-fluid">
  <div class="row clearfix">
    <div class="col-lg-8 col-md-10 col-sm-12 mx-auto">
      <div class="card">
        <div class="header">
          <h2><strong>Add</strong> UserGroup</h2>
        </div>

        <div class="body">
          <form method="POST">
            {% csrf_token %}

            <div class="form-group">
              <label class="font-weight-bold mb-2">
                Group Name
              </label>

              <input
                type="text"
                name="group_name"
                class="form-control form-control-lg"
                placeholder="Enter UserGroup Name"
                required
              />
            </div>

            <div class="mt-4">
              <button
                type="submit"
                class="btn btn-primary btn-round px-4"
              >
                <i class="zmdi zmdi-plus"></i>
                Add Group
              </button>

              <a
                href="{% url 'grouplist' %}"
                class="btn btn-default btn-round ml-2"
              >
                Cancel
              </a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>


{% endblock content %}
