{% extends "base.html" %} {% load static %} {% block content %}
<!-- Main Content Heading Block -->
<div class="block-header">
  <div class="row">
    <div class="col-lg-5 col-md-5 col-sm-12">
      <h2>
        Edit User Settings
        <small>Modify account parameters for {{ target_user.username }}</small>
      </h2>
    </div>
    <div class="col-lg-7 col-md-7 col-sm-12 text-md-right">
      <ul class="breadcrumb float-md-right">
        <li class="breadcrumb-item">
          <a href="{% url 'index' %}"><i class="zmdi zmdi-home"></i> Oreo</a>
        </li>
        <li class="breadcrumb-item active">Edit User</li>
      </ul>
    </div>
  </div>
</div>

<div class="container-fluid">
  <div class="row clearfix">
    <div class="col-lg-12 col-md-12 col-sm-12">
      <div class="card">
        <div class="header">
          <h2><strong>Account</strong> Configuration Panel</h2>
        </div>
        <div class="body">
          <!-- SECURE FORM UPDATE POST HANDLER -->
          <form method="POST" action="{% url 'edituser' target_user.id %}">
            {% csrf_token %}

            <!-- USERNAME CONTROL BOX -->
            <div class="row clearfix mb-3">
              <div class="col-sm-12">
                <label for="username" class="form-label fw-bold text-muted mb-1"
                  >Account Username</label
                >
                <div class="input-group">
                  <input
                    type="text"
                    id="username"
                    name="username"
                    value="{{ target_user.username }}"
                    class="form-control"
                    placeholder="Modify Username"
                    required
                  />
                  <span class="input-group-addon">
                    <i class="zmdi zmdi-account-circle"></i>
                  </span>
                </div>
              </div>
            </div>

            <!-- EMAIL ADDRESS CONTROL BOX -->
            <div class="row clearfix mb-4">
              <div class="col-sm-12">
                <label for="email" class="form-label fw-bold text-muted mb-1"
                  >Email Address</label
                >
                <div class="input-group">
                  <input
                    type="email"
                    id="email"
                    name="email"
                    value="{{ target_user.email }}"
                    class="form-control"
                    placeholder="Modify Email Address"
                  />
                  <span class="input-group-addon">
                    <i class="zmdi zmdi-email"></i>
                  </span>
                </div>
              </div>
            </div>

            <!-- TRANSACTION SUBMIT UTILITIES -->
            <div class="row clearfix">
              <div class="col-sm-12">
                <button
                  type="submit"
                  class="btn btn-primary btn-round px-4 py-2 mr-2"
                >
                  <i class="zmdi zmdi-save m-r-5"></i> Save Changes
                </button>
                <a
                  href="/child/2/"
                  class="btn btn-default btn-round btn-simple px-4 py-2 text-muted"
                >
                  Cancel
                </a>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock content %}
