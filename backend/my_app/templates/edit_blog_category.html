{% extends "base.html" %}
{% block content %}

<style>

    .btn-theme {
    background-color: #011824;
    border-color: #011824;
    color: #fff;
    border-radius: 30px;
    padding: 10px 24px;
    font-weight: 500;
    transition: all 0.3s ease;
}

.btn-theme:hover,
.btn-theme:focus {
    background-color: #02314a;
    border-color: #02314a;
    color: #fff;
    box-shadow: none;
}

.btn-cancel {
    background-color: #fff;
    border: 1px solid #011824;
    color: #011824;
    border-radius: 30px;
    padding: 10px 24px;
    font-weight: 500;
    transition: all 0.3s ease;
}

.btn-cancel:hover,
.btn-cancel:focus {
    background-color: #011824;
    color: #fff;
    border-color: #011824;
    box-shadow: none;
}

</style>

<div class="block-header">
    <div class="row">
        <div class="col-lg-5 col-md-5 col-sm-12">
            <h2>
                Edit Blog Category
                <small>Update an existing blog category</small>
            </h2>
        </div>

        <div class="col-lg-7 col-md-7 col-sm-12 text-md-right">
            <ul class="breadcrumb float-md-right">
                <li class="breadcrumb-item">
                    <a href="{% url 'index' %}">
                        <i class="zmdi zmdi-home"></i> Xen Properties
                    </a>
                </li>
                <li class="breadcrumb-item">
                    <a href="{% url 'blog_category_list' %}">Blog Categories</a>
                </li>
                <li class="breadcrumb-item active">Edit Category</li>
            </ul>
        </div>
    </div>
</div>

<div class="container-fluid">

    <div class="row clearfix">

        <div class="col-lg-12 col-md-12 col-sm-12">

            <div class="card">

                <div class="header">
                    <h2><strong>Category</strong> Information</h2>
                </div>

                <div class="body">

                    <form method="POST">
                        {% csrf_token %}

                        <div class="row clearfix">

                            <div class="col-md-6 mb-4">
                                <label class="form-label fw-bold">Category Name</label>

                                <input
                                    type="text"
                                    name="name"
                                    value="{{ category.name }}"
                                    class="form-control"
                                    placeholder="Enter category name"
                                    required
                                >
                            </div>

                            <div class="col-md-6 mb-4">
                                <label class="form-label fw-bold">Slug</label>

                                <input
                                    type="text"
                                    name="slug"
                                    value="{{ category.slug }}"
                                    class="form-control"
                                    placeholder="Enter slug"
                                    required
                                >
                            </div>

                        </div>

                       <button type="submit" class="btn btn-theme">
    <i class="zmdi zmdi-check m-r-5"></i> Update Category
</button>

<a href="{% url 'blog_category_list' %}" class="btn btn-cancel">
    Cancel
</a>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
